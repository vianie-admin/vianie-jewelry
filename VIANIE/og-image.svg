<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <!-- Fondo con gradiente elegante -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2c2c2c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b68d40;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d4af65;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b68d40;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Fondo -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Patrón decorativo sutil -->
  <circle cx="150" cy="150" r="200" fill="#b68d40" opacity="0.05"/>
  <circle cx="1050" cy="480" r="250" fill="#b68d40" opacity="0.05"/>
  
  <!-- Borde dorado superior -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#goldGrad)"/>
  
  <!-- Diamante/Joya grande centrado -->
  <g transform="translate(600, 200)">
    <path d="M0 -80 L80 0 L0 120 L-80 0 Z" fill="none" stroke="url(#goldGrad)" stroke-width="4" stroke-linejoin="round"/>
    <line x1="-80" y1="0" x2="80" y2="0" stroke="url(#goldGrad)" stroke-width="3"/>
    <path d="M0 -80 L40 -20 L0 40 L-40 -20 Z" fill="url(#goldGrad)" opacity="0.3"/>
  </g>
  
  <!-- Título principal -->
  <text x="600" y="380" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="bold" fill="#b68d40" letter-spacing="8">VIANIE</text>
  
  <!-- Subtítulo -->
  <text x="600" y="430" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" fill="#999" letter-spacing="4">JEWELRY</text>
  
  <!-- Línea decorativa -->
  <line x1="450" y1="455" x2="750" y2="455" stroke="url(#goldGrad)" stroke-width="2"/>
  
  <!-- Descripción -->
  <text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#ccc">Accesorios Elegantes en Acero Inox</text>
  
  <!-- Texto inferior -->
  <text x="600" y="550" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#666">Envíos a domicilio en Santa Cruz, Bolivia</text>
  
  <!-- Borde dorado inferior -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#goldGrad)"/>
</svg>
